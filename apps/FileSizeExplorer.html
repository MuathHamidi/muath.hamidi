<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory X-Ray</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #111827; 
        }
        ::-webkit-scrollbar-thumb {
            background: #374151; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4B5563; 
        }
        
        .cursor-wait { cursor: wait; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 selection:bg-indigo-500 selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef, useEffect } = React;

        // --- ICONS (Inline SVGs to avoid dependencies) ---
        const Icon = ({ children, className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const HardDrive = ({ className }) => (
            <Icon className={className}>
                <line x1="22" y1="12" x2="2" y2="12"></line>
                <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
                <line x1="6" y1="16" x2="6.01" y2="16"></line>
                <line x1="10" y1="16" x2="10.01" y2="16"></line>
            </Icon>
        );

        const FolderOpen = ({ className }) => (
            <Icon className={className}>
                <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </Icon>
        );

        const RefreshCw = ({ className }) => (
            <Icon className={className}>
                <path d="M21 2v6h-6"></path>
                <path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path>
                <path d="M3 22v-6h6"></path>
                <path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
            </Icon>
        );

        const AlertCircle = ({ className }) => (
            <Icon className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </Icon>
        );

        const FilterIcon = ({ className }) => (
            <Icon className={className}>
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </Icon>
        );

        const SearchIcon = ({ className }) => (
            <Icon className={className}>
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </Icon>
        );

        const FileText = ({ className }) => (
            <Icon className={className}>
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
            </Icon>
        );

        const ArrowUp = ({ className }) => (
            <Icon className={className}>
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </Icon>
        );

        const ArrowDown = ({ className }) => (
            <Icon className={className}>
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <polyline points="19 12 12 19 5 12"></polyline>
            </Icon>
        );

        const CopyIcon = ({ className }) => (
            <Icon className={className}>
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </Icon>
        );

        const CheckIcon = ({ className }) => (
            <Icon className={className}>
                <polyline points="20 6 9 17 4 12"></polyline>
            </Icon>
        );

        const CopyButton = ({ text }) => {
            const [copied, setCopied] = useState(false);

            const handleCopy = (e) => {
                e.stopPropagation();
                // Fallback copy method for iframe compatibility
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2000);
                } catch (err) {
                    console.error('Failed to copy', err);
                }
                document.body.removeChild(textArea);
            };

            return (
                <button 
                    onClick={handleCopy}
                    className="ml-2 p-1.5 hover:bg-gray-700 rounded-md transition-all text-gray-500 hover:text-indigo-400 opacity-0 group-hover:opacity-100 focus:opacity-100 shrink-0"
                    title="Copy full path"
                >
                    {copied ? <CheckIcon className="w-3.5 h-3.5 text-green-400" /> : <CopyIcon className="w-3.5 h-3.5" />}
                </button>
            );
        };


        // --- MAIN APP COMPONENT ---

        const FileExplorer = () => {
            const [files, setFiles] = useState([]);
            const [scanning, setScanning] = useState(false);
            const [error, setError] = useState(null);
            const [rootDirName, setRootDirName] = useState(null);
            const fileInputRef = useRef(null);

            // Filter States
            const [minSizeVal, setMinSizeVal] = useState(0);
            const [minSizeUnit, setMinSizeUnit] = useState(1024 * 1024); // Default MB
            const [maxSizeVal, setMaxSizeVal] = useState(100);
            const [maxSizeUnit, setMaxSizeUnit] = useState(1024 * 1024 * 1024); // Default GB
            const [searchTerm, setSearchTerm] = useState('');
            const [sortBy, setSortBy] = useState('size'); // 'size', 'name'
            const [sortDesc, setSortDesc] = useState(true);

            // Constants for units
            const UNITS = {
                B: 1,
                KB: 1024,
                MB: 1024 * 1024,
                GB: 1024 * 1024 * 1024,
            };

            const formatBytes = (bytes, decimals = 2) => {
                if (bytes === 0) return '0 Bytes';
                const k = 1024;
                const dm = decimals < 0 ? 0 : decimals;
                const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
            };

            const handleTriggerUpload = () => {
                if (fileInputRef.current) {
                    fileInputRef.current.click();
                }
            };

            const handleFileSelect = (event) => {
                setError(null);
                setScanning(true);
                setFiles([]);
                setRootDirName(null);

                const fileList = event.target.files;
                
                if (!fileList || fileList.length === 0) {
                    setScanning(false);
                    return;
                }

                // Process files
                // Note: The input returns a FileList, not an array, so we convert it
                const processedFiles = Array.from(fileList).map(file => {
                    // webkitRelativePath usually looks like "Folder/Subfolder/file.txt"
                    // We extract the root folder name from the first file if not set
                    const pathParts = file.webkitRelativePath.split('/');
                    const root = pathParts[0];
                    const relativePath = pathParts.slice(1).join('/');

                    return {
                        name: file.name,
                        path: relativePath || file.name, // Fallback if at root
                        root: root,
                        size: file.size,
                        type: file.type || 'unknown',
                        lastModified: file.lastModified
                    };
                });

                if (processedFiles.length > 0) {
                    setRootDirName(processedFiles[0].root);
                }

                setFiles(processedFiles);
                setScanning(false);
                
                // Reset input so selecting the same folder again works
                event.target.value = '';
            };

            // Derived state for filtered and sorted files
            const processedFiles = useMemo(() => {
                const minBytes = minSizeVal * minSizeUnit;
                const maxBytes = maxSizeVal * maxSizeUnit;
                const searchLower = searchTerm.toLowerCase();

                let result = files.filter(f => {
                    // Size Filter
                    const fitsMin = f.size >= minBytes;
                    const fitsMax = maxSizeVal === '' || maxSizeVal === 0 ? true : f.size <= maxBytes;
                    
                    // Name Search
                    const fitsSearch = f.name.toLowerCase().includes(searchLower) || f.path.toLowerCase().includes(searchLower);

                    return fitsMin && fitsMax && fitsSearch;
                });

                result.sort((a, b) => {
                    let valA = a[sortBy];
                    let valB = b[sortBy];
                    
                    // String comparison for names
                    if (typeof valA === 'string') valA = valA.toLowerCase();
                    if (typeof valB === 'string') valB = valB.toLowerCase();

                    if (valA < valB) return sortDesc ? 1 : -1;
                    if (valA > valB) return sortDesc ? -1 : 1;
                    return 0;
                });

                return result;
            }, [files, minSizeVal, minSizeUnit, maxSizeVal, maxSizeUnit, sortBy, sortDesc, searchTerm]);

            const toggleSort = (field) => {
                if (sortBy === field) {
                    setSortDesc(!sortDesc);
                } else {
                    setSortBy(field);
                    setSortDesc(true);
                }
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Hidden Input for Directory Selection */}
                        <input 
                            type="file" 
                            ref={fileInputRef}
                            onChange={handleFileSelect}
                            webkitdirectory="true"
                            directory="true"
                            multiple
                            className="hidden" 
                        />

                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800">
                            <div>
                                <h1 className="text-3xl font-bold flex items-center gap-3 text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-cyan-400">
                                    <HardDrive className="w-8 h-8 text-indigo-400" />
                                    Directory X-Ray
                                </h1>
                                <p className="text-gray-400 mt-2 font-medium">Deep scan your folders and visualize file density.</p>
                            </div>
                            
                            <button 
                                onClick={handleTriggerUpload}
                                disabled={scanning}
                                className={`mt-6 md:mt-0 flex items-center gap-2 px-8 py-4 rounded-xl font-bold transition-all shadow-lg active:scale-95 group
                                    ${scanning 
                                        ? 'bg-gray-800 text-gray-500 cursor-wait border border-gray-700' 
                                        : 'bg-indigo-600 text-white hover:bg-indigo-500 hover:shadow-indigo-500/20 border border-indigo-500'
                                    }`}
                            >
                                {scanning ? <RefreshCw className="w-5 h-5 animate-spin" /> : <FolderOpen className="w-5 h-5 group-hover:scale-110 transition-transform" />}
                                {scanning ? 'Analyzing...' : 'Select Directory'}
                            </button>
                        </div>

                        {/* Error Message */}
                        {error && (
                            <div className="bg-red-900/20 text-red-200 p-4 rounded-xl flex items-center gap-3 border border-red-500/30">
                                <AlertCircle className="w-5 h-5 shrink-0 text-red-400" />
                                <p>{error}</p>
                            </div>
                        )}

                        {/* Dashboard Grid */}
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* Controls Panel */}
                            <div className="lg:col-span-4 bg-gray-900 p-6 rounded-2xl shadow-xl border border-gray-800 h-fit sticky top-6">
                                <div className="flex items-center gap-2 mb-6 text-white font-bold text-lg border-b border-gray-800 pb-4">
                                    <FilterIcon className="w-5 h-5 text-indigo-400" />
                                    Filters & Search
                                </div>

                                <div className="space-y-6">
                                    
                                    {/* Search */}
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Search Files</label>
                                        <div className="relative">
                                            <SearchIcon className="absolute left-3 top-3 w-4 h-4 text-gray-500" />
                                            <input 
                                                type="text" 
                                                placeholder="filename.ext"
                                                value={searchTerm}
                                                onChange={(e) => setSearchTerm(e.target.value)}
                                                className="w-full bg-gray-950 border border-gray-800 rounded-lg pl-10 pr-3 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all placeholder-gray-600 text-white"
                                            />
                                        </div>
                                    </div>

                                    {/* Min Size */}
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Minimum Size</label>
                                        <div className="flex gap-2">
                                            <input 
                                                type="number" 
                                                min="0"
                                                value={minSizeVal}
                                                onChange={(e) => setMinSizeVal(Number(e.target.value))}
                                                className="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white"
                                            />
                                            <select 
                                                value={minSizeUnit}
                                                onChange={(e) => setMinSizeUnit(Number(e.target.value))}
                                                className="bg-gray-950 border border-gray-800 rounded-lg px-2 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white"
                                            >
                                                {Object.entries(UNITS).map(([label, val]) => (
                                                    <option key={`min-${label}`} value={val}>{label}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Max Size */}
                                    <div>
                                        <label className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 block">Maximum Size</label>
                                        <div className="flex gap-2">
                                            <input 
                                                type="number" 
                                                min="0"
                                                value={maxSizeVal}
                                                onChange={(e) => setMaxSizeVal(Number(e.target.value))}
                                                className="w-full bg-gray-950 border border-gray-800 rounded-lg px-3 py-2.5 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white"
                                            />
                                            <select 
                                                value={maxSizeUnit}
                                                onChange={(e) => setMaxSizeUnit(Number(e.target.value))}
                                                className="bg-gray-950 border border-gray-800 rounded-lg px-2 py-2.5 text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-white"
                                            >
                                                {Object.entries(UNITS).map(([label, val]) => (
                                                    <option key={`max-${label}`} value={val}>{label}</option>
                                                ))}
                                            </select>
                                        </div>
                                    </div>

                                    {/* Stats Summary */}
                                    <div className="pt-4 border-t border-gray-800 mt-4 space-y-3">
                                        <div className="flex justify-between items-center text-sm">
                                            <span className="text-gray-500">Total Scanned</span>
                                            <span className="font-mono font-bold text-gray-300">{scanning ? '...' : files.length}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-sm">
                                            <span className="text-gray-500">Visible</span>
                                            <span className="font-mono font-bold text-indigo-400">{processedFiles.length}</span>
                                        </div>
                                        {processedFiles.length !== files.length && (
                                            <div className="text-xs text-center text-gray-600 mt-2 bg-gray-950 py-2 rounded border border-gray-800">
                                                {files.length - processedFiles.length} hidden by filters
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>

                            {/* Results Table */}
                            <div className="lg:col-span-8 bg-gray-900 rounded-2xl shadow-xl border border-gray-800 overflow-hidden flex flex-col min-h-[500px]">
                                {/* Table Header */}
                                <div className="grid grid-cols-12 gap-4 p-4 bg-gray-950 border-b border-gray-800 text-xs font-bold text-gray-500 uppercase tracking-wider select-none">
                                    <div 
                                        className="col-span-6 cursor-pointer hover:text-indigo-400 flex items-center gap-1 transition-colors"
                                        onClick={() => toggleSort('name')}
                                    >
                                        File Name
                                        {sortBy === 'name' && (sortDesc ? <ArrowDown className="w-3 h-3 text-indigo-500" /> : <ArrowUp className="w-3 h-3 text-indigo-500" />)}
                                    </div>
                                    <div className="col-span-3 text-right">Path</div>
                                    <div 
                                        className="col-span-3 text-right cursor-pointer hover:text-indigo-400 flex items-center justify-end gap-1 transition-colors"
                                        onClick={() => toggleSort('size')}
                                    >
                                        Size
                                        {sortBy === 'size' && (sortDesc ? <ArrowDown className="w-3 h-3 text-indigo-500" /> : <ArrowUp className="w-3 h-3 text-indigo-500" />)}
                                    </div>
                                </div>

                                {/* Content List */}
                                <div className="overflow-y-auto flex-grow max-h-[600px] scrollbar-thin scrollbar-thumb-gray-700 scrollbar-track-transparent">
                                    {files.length === 0 && !scanning ? (
                                        <div className="flex flex-col items-center justify-center h-full min-h-[300px] text-gray-600">
                                            <div className="w-20 h-20 bg-gray-800 rounded-full flex items-center justify-center mb-4 border border-gray-700">
                                                <FileText className="w-10 h-10 opacity-30" />
                                            </div>
                                            <p className="font-medium text-lg">No directory loaded</p>
                                            <p className="text-sm mt-1">Select a folder to begin analysis</p>
                                        </div>
                                    ) : (
                                        <>
                                            {processedFiles.length > 0 ? (
                                                processedFiles.map((file, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        className="grid grid-cols-12 gap-4 p-4 border-b border-gray-800 hover:bg-gray-800/50 transition-all text-sm group items-center"
                                                    >
                                                        <div className="col-span-6 font-medium text-gray-300 flex items-center gap-3 overflow-hidden">
                                                            <div className={`w-2 h-2 rounded-full shrink-0 ${file.size > 1024 * 1024 * 100 ? 'bg-pink-500' : 'bg-indigo-500'}`}></div>
                                                            <span title={file.name} className="truncate group-hover:text-white transition-colors">{file.name}</span>
                                                        </div>
                                                        <div className="col-span-3 flex justify-end items-center text-right overflow-hidden">
                                                            <span className="truncate text-gray-500 group-hover:text-gray-400 font-mono text-xs" title={`${rootDirName}/${file.path}`}>
                                                                {rootDirName}/{file.path}
                                                            </span>
                                                            <CopyButton text={`${rootDirName}/${file.path}`} />
                                                        </div>
                                                        <div className="col-span-3 text-right font-mono text-indigo-300 font-medium">
                                                            {formatBytes(file.size)}
                                                        </div>
                                                    </div>
                                                ))
                                            ) : (
                                                <div className="flex flex-col items-center justify-center h-64 text-gray-500">
                                                    <p>No files match current filters.</p>
                                                    <button 
                                                        onClick={() => { setMinSizeVal(0); setMaxSizeVal(''); setSearchTerm(''); }}
                                                        className="mt-3 text-indigo-400 hover:text-indigo-300 text-sm font-medium border-b border-indigo-400/30 hover:border-indigo-400 pb-0.5 transition-all"
                                                    >
                                                        Clear Filters
                                                    </button>
                                                </div>
                                            )}
                                        </>
                                    )}
                                    
                                    {scanning && (
                                        <div className="p-8 flex flex-col items-center justify-center gap-3 text-indigo-400 bg-gray-900/50 animate-pulse">
                                            <RefreshCw className="w-6 h-6 animate-spin" />
                                            <span className="font-medium">Reading directory structure...</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FileExplorer />);
    </script>
</body>
</html>
