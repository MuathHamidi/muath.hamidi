<!-- NOTIFICATION SYSTEM -->
<div id="toast-container" class="fixed top-4 right-4 z-[110] flex flex-col gap-2"></div>

<!-- MODALS OVERLAY -->
<div id="modal-overlay" class="fixed inset-0 bg-black/70 z-[100] hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
    <div id="modal-content" class="bg-gray-800 rounded-xl shadow-2xl border border-gray-700 w-full max-w-md p-6 transform transition-transform scale-95">
        <!-- Modal Content Injected Here -->
    </div>
</div>

<!-- LIGHTBOX OVERLAY -->
<div id="lightbox-overlay" class="fixed inset-0 bg-black/90 z-[100] hidden flex flex-col items-center justify-center backdrop-blur-md transition-opacity animate-fade-in" onclick="app.closeLightbox()">
    <button class="absolute top-6 right-6 text-gray-400 hover:text-white bg-gray-900/50 rounded-full p-2 transition-colors" onclick="app.closeLightbox()">
        <i data-lucide="x" class="w-8 h-8"></i>
    </button>
    <img id="lightbox-img" src="" class="max-w-[90vw] max-h-[90vh] object-contain rounded shadow-2xl" onclick="event.stopPropagation()">
</div>
