<!-- MAIN CHAT AREA -->
<main class="flex-1 flex flex-col bg-gray-700 relative bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23ffffff\' fill-opacity=\'0.02\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')]">
    <!-- Chat Header -->
    <header class="h-14 border-b border-gray-800/80 flex items-center px-5 shadow-sm bg-gray-800/95 backdrop-blur z-10 justify-between">
        <div class="flex items-center gap-3 flex-1 min-w-0 pr-4">
            <i id="chat-header-icon" data-lucide="hash" class="w-6 h-6 text-gray-400 shrink-0"></i>
            <h2 id="chat-header-title" class="font-bold text-lg text-white truncate tracking-tight">Select a channel</h2>
            <div class="flex items-center gap-1.5 text-xs text-green-400 ml-2 bg-green-900/20 border border-green-800/50 px-2.5 py-1 rounded-full shrink-0" title="End-to-End Encrypted Communication">
                <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> <span class="hidden sm:inline font-medium">E2E Encrypted</span>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Search Bar -->
            <div class="relative hidden md:block group z-20">
                <input type="text" id="chat-search" placeholder="Search messages..." class="bg-gray-900 text-white text-sm rounded-full pl-9 pr-4 py-1.5 focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-gray-700 w-48 focus:w-64 transition-all duration-300 disabled:opacity-50" onkeyup="app.handleSearch()" disabled>
                <i data-lucide="search" class="w-4 h-4 text-gray-400 absolute left-3 top-2 group-focus-within:text-indigo-400 transition-colors"></i>
            </div>
            
            <div id="chat-header-actions" class="flex items-center gap-2 text-gray-400 z-20">
                <!-- Actions like leave server injected here -->
            </div>
        </div>
    </header>

    <!-- Messages Area -->
    <div id="messages-container" class="flex-1 overflow-y-auto p-4 flex flex-col scroll-smooth">
        <!-- Messages injected here -->
        <div class="h-full flex items-center justify-center text-gray-400 flex-col gap-4 animate-fade-in">
            <div class="w-20 h-20 bg-gray-800 rounded-2xl flex items-center justify-center shadow-lg transform rotate-3">
                <i data-lucide="messages-square" class="w-10 h-10 text-indigo-400 -rotate-3"></i>
            </div>
            <div class="text-center">
                <h3 class="text-white font-bold text-xl mb-1 tracking-tight">Welcome to Nexus</h3>
                <p class="text-sm">Select a server or Direct Message from the sidebar to begin.</p>
            </div>
        </div>
    </div>

    <!-- Pending Uploads Preview -->
    <div id="uploads-preview" class="hidden absolute bottom-[90px] left-6 right-6 bg-gray-800/95 backdrop-blur-md rounded-xl p-3 border border-gray-600 shadow-2xl flex gap-3 overflow-x-auto z-50">
        <!-- Previews injected here -->
    </div>

    <!-- Input Area -->
    <div class="px-4 pb-4 pt-2 relative z-40">
        <!-- Edit Indicator -->
        <div id="edit-indicator" class="hidden absolute -top-8 left-6 bg-indigo-600 text-white text-xs font-bold px-3 py-1.5 rounded-t-lg flex items-center gap-2 z-10 shadow-lg">
            <i data-lucide="pen-line" class="w-3.5 h-3.5"></i> Editing Message
            <button onclick="app.cancelEdit()" class="ml-2 hover:text-indigo-200 transition-colors underline decoration-dotted underline-offset-2">Cancel (Esc)</button>
        </div>

        <form id="message-form" class="relative flex items-end bg-gray-800 rounded-xl z-20 transition-all border border-gray-600 focus-within:border-indigo-500 focus-within:ring-1 focus-within:ring-indigo-500 shadow-lg">
            <label for="file-upload" class="p-3.5 mb-1 text-gray-400 hover:text-white cursor-pointer transition-colors bg-gray-800 rounded-l-xl" title="Upload Media/Files">
                <i data-lucide="paperclip" class="w-5 h-5"></i>
            </label>
            <input type="file" id="file-upload" class="hidden" multiple accept="image/*,video/*,audio/*,.pdf,.html,.htm,.doc,.docx,.txt,.zip,.rar">
            
            <textarea id="message-input" rows="1" placeholder="Message..." class="flex-1 bg-transparent text-white focus:outline-none py-3.5 px-1 placeholder-gray-500 disabled:opacity-50 resize-none max-h-40 overflow-y-auto" disabled></textarea>
            
            <button type="submit" id="send-btn" class="p-3.5 mb-1 text-indigo-500 hover:text-indigo-400 disabled:text-gray-600 transition-colors bg-gray-800 rounded-r-xl" disabled>
                <i data-lucide="send-horizonal" class="w-5 h-5"></i>
            </button>
        </form>
    </div>
</main>
