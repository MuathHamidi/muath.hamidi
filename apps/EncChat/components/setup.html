<!-- SETUP VIEW -->
<div id="setup-view" class="flex-1 flex items-center justify-center bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gray-800 via-gray-900 to-black w-full h-full z-40 absolute inset-0">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700 text-center">
        <div class="flex justify-center mb-4 text-indigo-500">
            <i data-lucide="folder-lock" class="w-16 h-16"></i>
        </div>
        <h1 class="text-3xl font-bold mb-2 text-white tracking-tight">Storage Vault</h1>
        <p class="text-gray-400 mb-6 text-sm">Select a local folder and set a Vault Password. This password mathematically encrypts the entire database file so absolutely no metadata (usernames, IDs) is visible.</p>
        
        <div class="mb-6 text-left">
            <label class="block text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Vault Encryption Password</label>
            <input type="password" id="vault-password" placeholder="Enter Vault Password" class="w-full bg-gray-900 text-white border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500 transition-colors shadow-inner">
        </div>

        <button onclick="app.selectDirectory()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-lg transition-colors shadow-lg shadow-indigo-600/20">
            Unlock / Create Vault Directory
        </button>
    </div>
</div>
