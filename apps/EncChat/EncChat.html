<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Encrypted Chat</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Dynamic Theme Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Map Tailwind grays to our CSS variables for dynamic backgrounds and text
                        gray: {
                            900: 'rgb(var(--color-bg-base) / <alpha-value>)',
                            800: 'rgb(var(--color-bg-surface) / <alpha-value>)',
                            700: 'rgb(var(--color-bg-elevated) / <alpha-value>)',
                            600: 'rgb(var(--color-border) / <alpha-value>)',
                            500: 'rgb(var(--color-text-muted) / <alpha-value>)',
                            400: 'rgb(var(--color-text-muted) / <alpha-value>)',
                            300: 'rgb(var(--color-text-main) / <alpha-value>)',
                            200: 'rgb(var(--color-text-main) / <alpha-value>)',
                            100: 'rgb(var(--color-text-main) / <alpha-value>)',
                        },
                        // Map Tailwind indigo to our CSS variables for dynamic accents
                        indigo: {
                            400: 'rgb(var(--color-accent-light) / <alpha-value>)',
                            500: 'rgb(var(--color-accent) / <alpha-value>)',
                            600: 'rgb(var(--color-accent) / <alpha-value>)',
                            700: 'rgb(var(--color-accent-hover) / <alpha-value>)'
                        }
                    }
                }
            }
        };
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-900 text-gray-100 h-screen w-screen overflow-hidden flex font-sans selection:bg-indigo-500 selection:text-white transition-colors duration-500">

    <!-- Global Noise Overlay for Texture -->
    <div class="bg-noise"></div>

    <!-- Mounting points for HTML components -->
    <div id="overlays-mount" class="contents"></div>
    <div id="setup-mount" class="contents"></div>
    <div id="auth-mount" class="contents"></div>
    <div id="app-mount" class="contents"></div>

    <!-- MAIN APPLICATION LOGIC SCRIPT -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
