<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Data Visualizer Pro</title>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .plot-container {
            min-height: 500px;
        }
        input[type="file"]::file-selector-button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 12px;
            transition: background 0.2s;
        }
        input[type="file"]::file-selector-button:hover {
            background: #2563eb;
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
        .scale-toggle-btn.active {
            background-color: #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-4 sticky top-0 z-50 bg-[#0f172af0] py-4 backdrop-blur-md">
            <div>
                <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-indigo-400">
                    Crystal Intensity Viewer
                </h1>
                <p id="scaleIndicator" class="text-slate-400 mt-1 text-sm">2D Analysis & Spherical 3D Mapping</p>
            </div>
            
            <div class="flex flex-wrap gap-4 items-center">
                <!-- Scale Toggle -->
                <div class="glass-panel p-1 rounded-lg flex items-center border border-slate-700">
                    <button id="linearScaleBtn" class="scale-toggle-btn active text-xs font-bold px-3 py-1.5 rounded-md transition-all">LINEAR</button>
                    <button id="logScaleBtn" class="scale-toggle-btn text-slate-400 text-xs font-bold px-3 py-1.5 rounded-md transition-all">LOG₁₀</button>
                </div>

                <div class="glass-panel p-4 rounded-xl flex items-center gap-4">
                    <div class="flex flex-col">
                        <label class="text-xs font-semibold text-slate-500 uppercase mb-1">Upload Data Files</label>
                        <input type="file" id="fileInput" multiple accept=".txt,.dat,.csv" class="text-sm text-slate-300">
                    </div>
                </div>
            </div>
        </header>

        <div id="welcomeMessage" class="flex flex-col items-center justify-center py-20 border-2 border-dashed border-slate-700 rounded-3xl">
            <svg class="w-16 h-16 text-slate-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
            </svg>
            <p class="text-xl text-slate-500 text-center px-4 font-light">Upload your files to generate Intensity comparisons</p>
        </div>

        <!-- 2D Section -->
        <div id="section2D" class="hidden mb-12">
            <h2 class="text-xl font-semibold mb-6 text-slate-300 flex items-center">
                <span class="w-8 h-8 rounded-full bg-blue-500/20 text-blue-400 flex items-center justify-center mr-3 text-sm">1</span>
                2D Intensity Heatmaps
            </h2>
            <div id="grid2D" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>

        <!-- 3D Section -->
        <div id="section3D" class="hidden">
            <h2 class="text-xl font-semibold mb-6 text-slate-300 flex items-center border-t border-slate-800 pt-12">
                <span class="w-8 h-8 rounded-full bg-indigo-500/20 text-indigo-400 flex items-center justify-center mr-3 text-sm">2</span>
                Spherical 3D Projections (Unit Sphere)
            </h2>
            <div id="grid3D" class="grid grid-cols-1 lg:grid-cols-2 gap-6"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const grid2D = document.getElementById('grid2D');
        const grid3D = document.getElementById('grid3D');
        const welcomeMessage = document.getElementById('welcomeMessage');
        const section2D = document.getElementById('section2D');
        const section3D = document.getElementById('section3D');
        const linearScaleBtn = document.getElementById('linearScaleBtn');
        const logScaleBtn = document.getElementById('logScaleBtn');
        const scaleIndicator = document.getElementById('scaleIndicator');

        let isLogScale = false;
        let globalMaxVal = -Infinity;
        let globalMinVal = Infinity;
        let rawFilesData = []; // Store raw parsed data to switch scales without re-reading files

        fileInput.addEventListener('change', handleFileSelection);

        linearScaleBtn.addEventListener('click', () => setScaleMode(false));
        logScaleBtn.addEventListener('click', () => setScaleMode(true));

        function setScaleMode(logMode) {
            if (isLogScale === logMode) return;
            isLogScale = logMode;
            
            // UI Update
            if (isLogScale) {
                logScaleBtn.classList.add('active', 'text-white');
                logScaleBtn.classList.remove('text-slate-400');
                linearScaleBtn.classList.remove('active', 'text-white');
                linearScaleBtn.classList.add('text-slate-400');
                scaleIndicator.innerText = "2D Analysis & Spherical 3D Mapping (Log Scale)";
            } else {
                linearScaleBtn.classList.add('active', 'text-white');
                linearScaleBtn.classList.remove('text-slate-400');
                logScaleBtn.classList.remove('active', 'text-white');
                logScaleBtn.classList.add('text-slate-400');
                scaleIndicator.innerText = "2D Analysis & Spherical 3D Mapping (Linear Scale)";
            }

            if (rawFilesData.length > 0) {
                renderAllCharts();
            }
        }

        async function handleFileSelection(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            welcomeMessage.classList.add('hidden');
            section2D.classList.remove('hidden');
            section3D.classList.remove('hidden');
            
            rawFilesData = [];

            for (const file of files) {
                const text = await file.text();
                const data = parseCrystalFile(text);
                if (data) {
                    rawFilesData.push({ name: file.name, data });
                }
            }

            renderAllCharts();
        }

        function renderAllCharts() {
            grid2D.innerHTML = '';
            grid3D.innerHTML = '';
            globalMaxVal = -Infinity;
            globalMinVal = Infinity;

            // Pre-calculate global limits based on current scale mode
            rawFilesData.forEach(item => {
                const vals = item.data.zValues.flat().map(v => isLogScale ? Math.log10(Math.max(v, 1e-15)) : v);
                const localMax = Math.max(...vals);
                const localMin = Math.min(...vals);
                if (localMax > globalMaxVal) globalMaxVal = localMax;
                if (localMin < globalMinVal) globalMinVal = localMin;
            });

            rawFilesData.forEach(item => {
                create2DChart(item.name, item.data);
                create3DSphericalChart(item.name, item.data);
            });
        }

        function parseCrystalFile(content) {
            const lines = content.split('\n');
            const metadata = [];
            const rows = [];
            let headersFound = false;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('#')) {
                    metadata.push(line.replace('#', '').trim());
                    continue;
                }

                if (line.toLowerCase().includes('theta') && line.toLowerCase().includes('phi')) {
                    headersFound = true;
                    continue;
                }

                if (headersFound) {
                    const parts = line.split(/\s+/);
                    if (parts.length >= 6) {
                        rows.push({
                            theta: parseFloat(parts[0]),
                            phi: parseFloat(parts[1]),
                            intensity: parseFloat(parts[5])
                        });
                    }
                }
            }

            if (rows.length === 0) return null;

            const thetas = [...new Set(rows.map(r => r.theta))].sort((a, b) => a - b);
            const phis = [...new Set(rows.map(r => r.phi))].sort((a, b) => a - b);
            
            const zValues = phis.map(p => {
                return thetas.map(t => {
                    const match = rows.find(r => r.theta === t && r.phi === p);
                    return match ? match.intensity : 0; 
                });
            });

            return { thetas, phis, zValues, metadata };
        }

        function create2DChart(fileName, data) {
            const container = document.createElement('div');
            container.className = 'glass-panel rounded-2xl p-6 flex flex-col shadow-lg';
            
            const uniqueId = 'plot2d-' + Math.random().toString(36).substr(2, 9);
            const label = isLogScale ? 'Log₁₀ Heatmap' : 'Linear Heatmap';
            container.innerHTML = `
                <div class="mb-4">
                    <h3 class="text-md font-bold text-blue-300 truncate">${fileName}</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">${label}</p>
                </div>
                <div id="${uniqueId}" class="w-full h-[400px]"></div>
            `;
            
            grid2D.appendChild(container);

            const zData = data.zValues.map(row => row.map(v => isLogScale ? Math.log10(Math.max(v, 1e-15)) : v));

            const plotData = [{
                z: zData,
                x: data.thetas,
                y: data.phis,
                type: 'heatmap',
                colorscale: 'Viridis',
                zmin: globalMinVal,
                zmax: globalMaxVal,
                colorbar: {
                    title: { text: isLogScale ? 'Log₁₀(I)' : 'Int', font: { color: '#94a3b8', size: 10 } },
                    tickfont: { color: '#94a3b8' },
                    thickness: 10
                },
                hovertemplate: 'θ: %{x}°<br>φ: %{y}°<br>Val: %{z:.4f}<extra></extra>'
            }];

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { t: 10, r: 10, b: 40, l: 40 },
                font: { family: 'Inter, sans-serif', color: '#94a3b8' },
                xaxis: { title: 'Theta (deg)', gridcolor: '#1e293b' },
                yaxis: { title: 'Phi (deg)', gridcolor: '#1e293b' }
            };

            Plotly.newPlot(uniqueId, plotData, layout, { responsive: true, displaylogo: false });
        }

        function create3DSphericalChart(fileName, data) {
            const container = document.createElement('div');
            container.className = 'glass-panel rounded-2xl p-6 flex flex-col shadow-xl';
            
            const uniqueId = 'plot3d-' + Math.random().toString(36).substr(2, 9);
            const label = isLogScale ? 'Log Spherical Mapping' : 'Linear Spherical Mapping';
            container.innerHTML = `
                <div class="mb-4">
                    <h3 class="text-md font-bold text-indigo-300 truncate">${fileName}</h3>
                    <p class="text-[10px] text-slate-500 uppercase tracking-wider">${label} (r=1)</p>
                </div>
                <div id="${uniqueId}" class="w-full h-[500px]"></div>
            `;
            
            grid3D.appendChild(container);

            let sphereX = [];
            let sphereY = [];
            let sphereZ = [];
            let sphereIntensity = [];

            const phisExt = [...data.phis];
            const hasFullAzimuth = Math.abs(data.phis[data.phis.length - 1] - data.phis[0]) >= 350;
            if (hasFullAzimuth) {
                phisExt.push(phisExt[0] + 360);
            }

            phisExt.forEach((phi, pIdx) => {
                const phiRad = (phi * Math.PI) / 180;
                const rowX = [];
                const rowY = [];
                const rowZ = [];
                const rowI = [];
                
                const sourcePIdx = pIdx < data.phis.length ? pIdx : 0;

                data.thetas.forEach((theta, tIdx) => {
                    const thetaRad = (theta * Math.PI) / 180;
                    rowX.push(Math.sin(thetaRad) * Math.cos(phiRad));
                    rowY.push(Math.sin(thetaRad) * Math.sin(phiRad));
                    rowZ.push(Math.cos(thetaRad));
                    
                    const val = data.zValues[sourcePIdx][tIdx];
                    rowI.push(isLogScale ? Math.log10(Math.max(val, 1e-15)) : val);
                });
                sphereX.push(rowX);
                sphereY.push(rowY);
                sphereZ.push(rowZ);
                sphereIntensity.push(rowI);
            });

            const plotData = [{
                type: 'surface',
                x: sphereX,
                y: sphereY,
                z: sphereZ,
                surfacecolor: sphereIntensity,
                colorscale: 'Viridis',
                cmin: globalMinVal,
                cmax: globalMaxVal,
                colorbar: {
                    title: { text: isLogScale ? 'Log₁₀(I)' : 'Int', font: { color: '#94a3b8', size: 11 } },
                    tickfont: { color: '#94a3b8' },
                    thickness: 15
                },
                hovertemplate: 'Val: %{surfacecolor:.4f}<extra></extra>'
            }];

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                margin: { t: 0, r: 0, b: 0, l: 0 },
                scene: {
                    aspectmode: 'cube',
                    xaxis: { visible: false, range: [-1.2, 1.2] },
                    yaxis: { visible: false, range: [-1.2, 1.2] },
                    zaxis: { visible: false, range: [-1.2, 1.2] },
                    camera: { eye: { x: 1.5, y: 1.5, z: 1.5 } }
                }
            };

            Plotly.newPlot(uniqueId, plotData, layout, { responsive: true, displaylogo: false });
        }
    </script>
</body>
</html>
