<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDFs Securely</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- PDF-Lib for merging -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>

    <style>
        /* Custom scrollbar for dark mode */
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b; /* slate-800 */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #475569; /* slate-600 */
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #64748b; /* slate-500 */
        }

        /* Spinner animation */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }

        /* Drag overlay transition */
        #fullscreen-drop {
            transition: opacity 0.2s ease-in-out;
        }
        
        /* List item drag states */
        .list-item-dragging {
            opacity: 0.4;
            transform: scale(0.98);
        }
        .list-item-dragover {
            border-color: #6366f1 !important; /* indigo-500 */
            background-color: #334155 !important; /* slate-700 */
            transform: scale(1.02);
            z-index: 10;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen flex flex-col items-center p-4 sm:p-8">

    <!-- Global Drag & Drop Overlay -->
    <div id="fullscreen-drop" class="fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-sm opacity-0 pointer-events-none flex flex-col items-center justify-center border-4 border-indigo-500 border-dashed m-4 rounded-3xl shadow-2xl shadow-indigo-500/20">
        <i class="ph ph-file-pdf text-7xl text-indigo-400 mb-6 animate-bounce"></i>
        <h2 class="text-4xl font-bold text-white mb-2">Drop your PDFs here</h2>
        <p class="text-indigo-200 text-lg">Release to add them to your queue</p>
    </div>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-2"></div>

    <main class="w-full max-w-4xl bg-slate-900 rounded-2xl shadow-2xl overflow-hidden flex flex-col border border-slate-800 ring-1 ring-white/10 relative">
        
        <!-- Header -->
        <header class="bg-gradient-to-r from-indigo-900 to-slate-900 p-6 sm:p-8 border-b border-slate-800 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="p-3 bg-indigo-500/20 rounded-xl border border-indigo-500/30 shadow-inner">
                    <i class="ph ph-file-pdf text-3xl text-indigo-400"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-white tracking-tight">PDF Merger</h1>
                </div>
            </div>
            
            <button id="header-add-btn" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white rounded-lg font-medium shadow-sm transition-all flex items-center justify-center gap-2 group">
                <i class="ph ph-plus text-lg text-indigo-400 group-hover:text-indigo-300 transition-colors"></i>
                <span>Add Files</span>
            </button>
            <input type="file" id="file-input" class="hidden" multiple accept="application/pdf">
        </header>

        <div class="p-6 sm:p-8 flex flex-col gap-8">
            
            <!-- List of Selected Files -->
            <div class="flex flex-col gap-3 flex-grow min-h-[300px]">
                <div class="flex items-center justify-between pb-2 border-b border-slate-800">
                    <h2 class="text-lg font-semibold text-slate-300 flex items-center gap-2">
                        <i class="ph ph-list-numbers text-slate-400"></i>
                        Merge Queue
                    </h2>
                    <span id="file-count" class="text-sm font-medium text-slate-400 bg-slate-800 py-1 px-3 rounded-full ring-1 ring-slate-700">0 files</span>
                </div>
                
                <div id="file-list" class="flex flex-col gap-3 max-h-[450px] overflow-y-auto custom-scrollbar pr-2 pb-2">
                    <!-- Empty State -->
                    <div id="empty-state" class="text-center py-16 bg-slate-800/50 border-2 border-slate-700 rounded-xl border-dashed flex flex-col items-center">
                        <div class="w-20 h-20 bg-slate-800 rounded-full flex items-center justify-center mb-4 ring-8 ring-slate-800/50">
                            <i class="ph ph-upload-simple text-4xl text-slate-500"></i>
                        </div>
                        <p class="text-lg font-medium text-slate-300">No PDFs selected yet</p>
                        <p class="text-slate-500 mt-2 max-w-sm">Drag and drop your PDF files anywhere on this page, or click "Add Files" to browse.</p>
                    </div>
                </div>
            </div>

            <!-- Output Settings & Actions -->
            <div class="bg-slate-800/50 p-5 rounded-xl border border-slate-700 flex flex-col sm:flex-row gap-5 justify-between items-center mt-auto">
                
                <div class="w-full sm:w-auto flex-grow max-w-xs">
                    <label class="block text-xs font-semibold tracking-wide text-slate-400 uppercase mb-2">Output Filename</label>
                    <div class="relative flex items-center">
                        <input type="text" id="output-filename" value="Merged_Document" class="w-full bg-slate-900 border border-slate-700 rounded-lg py-2.5 pl-3 pr-12 text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all font-medium">
                        <span class="absolute right-3 text-slate-500 font-mono text-sm pointer-events-none">.pdf</span>
                    </div>
                </div>

                <div class="w-full sm:w-auto flex flex-col sm:flex-row gap-3 pt-6 sm:pt-0">
                    <button id="clear-btn" class="w-full sm:w-auto px-6 py-2.5 rounded-lg text-red-400 hover:text-red-300 font-medium hover:bg-red-500/10 border border-transparent hover:border-red-500/20 transition-all disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-transparent disabled:hover:border-transparent">
                        Clear All
                    </button>
                    <button id="merge-btn" class="w-full sm:w-auto px-8 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg font-semibold shadow-lg shadow-indigo-500/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none hover:-translate-y-0.5 active:translate-y-0">
                        <i class="ph ph-magic-wand text-lg"></i>
                        <span>Merge Files</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-8 text-center text-slate-500 text-sm flex items-center gap-2">
        <i class="ph ph-shield-check text-emerald-500 text-lg"></i>
        All processing occurs securely in your browser.
    </footer>

    <script>
        // State
        let selectedFiles = []; // Array of objects: { id, file, name, size, pages }
        
        // DOM Elements
        const fileInput = document.getElementById('file-input');
        const fileListContainer = document.getElementById('file-list');
        const emptyState = document.getElementById('empty-state');
        const fileCountSpan = document.getElementById('file-count');
        const mergeBtn = document.getElementById('merge-btn');
        const clearBtn = document.getElementById('clear-btn');
        const headerAddBtn = document.getElementById('header-add-btn');
        const toastContainer = document.getElementById('toast-container');
        const outputFilenameInput = document.getElementById('output-filename');
        const fullscreenDrop = document.getElementById('fullscreen-drop');

        // Initial setup
        updateUI();

        // --- Event Listeners ---

        // File input interactions
        headerAddBtn.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files) handleFiles(e.target.files);
            fileInput.value = ''; // Reset
        });

        // Global Drag and Drop
        let dragCounter = 0; // Prevent flickering on children nodes

        window.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (e.dataTransfer.types.includes('Files')) {
                fullscreenDrop.classList.remove('opacity-0', 'pointer-events-none');
            }
        });

        window.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                fullscreenDrop.classList.add('opacity-0', 'pointer-events-none');
            }
        });

        window.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        window.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            fullscreenDrop.classList.add('opacity-0', 'pointer-events-none');
            if (e.dataTransfer.files) handleFiles(e.dataTransfer.files);
        });

        // Buttons
        clearBtn.addEventListener('click', clearAll);
        mergeBtn.addEventListener('click', mergePDFs);

        // --- Core Logic ---

        function handleFiles(files) {
            let addedCount = 0;
            const newFiles = Array.from(files).filter(file => file.type === 'application/pdf');
            
            if (newFiles.length !== files.length) {
                showToast('Some files were ignored because they are not PDFs.', 'warning');
            }

            newFiles.forEach(file => {
                const id = Math.random().toString(36).substring(2, 9);
                const fileObj = {
                    id: id,
                    file: file,
                    name: file.name,
                    size: formatSize(file.size),
                    pages: '...' // Loading state
                };
                selectedFiles.push(fileObj);
                addedCount++;
                
                // Fetch page count asynchronously
                fetchPageCount(fileObj);
            });

            if (addedCount > 0) updateUI();
        }

        async function fetchPageCount(fileObj) {
            try {
                const arrayBuffer = await fileObj.file.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer, { ignoreEncryption: true });
                fileObj.pages = pdfDoc.getPageCount();
            } catch(e) {
                console.error("Error reading PDF pages:", e);
                fileObj.pages = '?';
            }
            // Update UI for this specific item without re-rendering everything
            const pageBadge = document.getElementById(`pages-${fileObj.id}`);
            if (pageBadge) {
                pageBadge.innerHTML = `<i class="ph ph-copy"></i> ${fileObj.pages} page${fileObj.pages !== 1 ? 's' : ''}`;
                pageBadge.classList.remove('animate-pulse', 'text-slate-500');
                pageBadge.classList.add('text-indigo-300');
            }
        }

        function removeFile(id) {
            selectedFiles = selectedFiles.filter(f => f.id !== id);
            updateUI();
        }

        function clearAll() {
            if (selectedFiles.length === 0) return;
            selectedFiles = [];
            updateUI();
            showToast('Queue cleared', 'info');
        }

        // --- Drag & Drop Reordering Logic ---
        let draggedIndex = null;

        function attachDragEvents(itemDiv, index) {
            itemDiv.draggable = true;

            itemDiv.addEventListener('dragstart', (e) => {
                draggedIndex = index;
                e.dataTransfer.effectAllowed = 'move';
                // Delay class addition so the dragged ghost image looks normal
                setTimeout(() => itemDiv.classList.add('list-item-dragging'), 0);
            });

            itemDiv.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                if (draggedIndex !== null && draggedIndex !== index) {
                    itemDiv.classList.add('list-item-dragover');
                }
            });

            itemDiv.addEventListener('dragleave', () => {
                itemDiv.classList.remove('list-item-dragover');
            });

            itemDiv.addEventListener('drop', (e) => {
                e.preventDefault();
                itemDiv.classList.remove('list-item-dragover');
                if (draggedIndex !== null && draggedIndex !== index) {
                    // Swap items in array
                    const draggedItem = selectedFiles.splice(draggedIndex, 1)[0];
                    selectedFiles.splice(index, 0, draggedItem);
                    updateUI(); // Re-render list
                }
            });

            itemDiv.addEventListener('dragend', () => {
                itemDiv.classList.remove('list-item-dragging');
                draggedIndex = null;
                // Clean up any remaining dragover classes just in case
                document.querySelectorAll('.list-item-dragover').forEach(el => el.classList.remove('list-item-dragover'));
            });
        }

        // --- Merging Logic ---

        async function mergePDFs() {
            if (selectedFiles.length < 2) {
                showToast('Please select at least 2 PDF files to merge.', 'error');
                return;
            }

            setLoading(true);

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                for (let i = 0; i < selectedFiles.length; i++) {
                    const fileObj = selectedFiles[i];
                    try {
                        const arrayBuffer = await fileObj.file.arrayBuffer();
                        const pdfToMerge = await PDFLib.PDFDocument.load(arrayBuffer);
                        const pageIndices = pdfToMerge.getPageIndices();
                        const copiedPages = await mergedPdf.copyPages(pdfToMerge, pageIndices);
                        copiedPages.forEach((page) => mergedPdf.addPage(page));
                    } catch (err) {
                        console.error(`Error processing ${fileObj.name}:`, err);
                        showToast(`Failed to process: ${fileObj.name}. It might be encrypted or corrupted.`, 'error');
                        setLoading(false);
                        return; 
                    }
                }

                const mergedPdfBytes = await mergedPdf.save();
                
                // Get custom filename
                let finalName = outputFilenameInput.value.trim() || 'Merged_Document';
                if (!finalName.toLowerCase().endsWith('.pdf')) {
                    finalName += '.pdf';
                }

                downloadFile(mergedPdfBytes, finalName, 'application/pdf');
                showToast('PDFs merged successfully!', 'success');

            } catch (error) {
                console.error("Merging error:", error);
                showToast('An unexpected error occurred during merging.', 'error');
            } finally {
                setLoading(false);
            }
        }

        // --- Helper Functions ---

        function updateUI() {
            fileCountSpan.textContent = `${selectedFiles.length} file${selectedFiles.length === 1 ? '' : 's'}`;
            mergeBtn.disabled = selectedFiles.length < 2;
            clearBtn.disabled = selectedFiles.length === 0;

            fileListContainer.innerHTML = '';
            
            if (selectedFiles.length === 0) {
                fileListContainer.appendChild(emptyState);
                return;
            }

            selectedFiles.forEach((fileObj, index) => {
                const itemDiv = document.createElement('div');
                // Added cursor-grab and transition classes for D&D
                itemDiv.className = 'flex items-center justify-between p-3.5 bg-slate-800 border border-slate-700 rounded-xl shadow-sm hover:border-indigo-500/50 transition-all group cursor-grab active:cursor-grabbing';
                
                const pageText = fileObj.pages === '...' 
                    ? '<i class="ph ph-spinner animate-spin-custom"></i> Reading'
                    : `<i class="ph ph-copy"></i> ${fileObj.pages} page${fileObj.pages !== 1 ? 's' : ''}`;
                
                const pageClass = fileObj.pages === '...' ? 'animate-pulse text-slate-500' : 'text-indigo-300';

                itemDiv.innerHTML = `
                    <div class="flex items-center gap-4 overflow-hidden pointer-events-none">
                        <div class="bg-indigo-500/10 p-2.5 rounded-lg text-indigo-400 shrink-0 flex items-center justify-center">
                            <i class="ph ph-dots-six-vertical text-xl opacity-50 mr-1"></i>
                            <i class="ph ph-file-pdf text-2xl"></i>
                        </div>
                        <div class="truncate flex flex-col justify-center">
                            <p class="text-sm font-semibold text-slate-200 truncate leading-tight">${fileObj.name}</p>
                            <div class="flex items-center gap-3 mt-1.5 text-xs">
                                <span class="text-slate-400 font-mono">${fileObj.size}</span>
                                <span class="w-1 h-1 bg-slate-600 rounded-full"></span>
                                <span id="pages-${fileObj.id}" class="flex items-center gap-1 font-medium ${pageClass}">${pageText}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center shrink-0 ml-2">
                        <button onclick="removeFile('${fileObj.id}')" class="p-2 rounded-lg text-slate-500 hover:text-red-400 hover:bg-red-500/10 transition-colors pointer-events-auto" title="Remove File">
                            <i class="ph ph-trash text-xl"></i>
                        </button>
                    </div>
                `;
                
                attachDragEvents(itemDiv, index);
                fileListContainer.appendChild(itemDiv);
            });
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function downloadFile(bytes, filename, mimeType) {
            const blob = new Blob([bytes], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                mergeBtn.disabled = true;
                mergeBtn.innerHTML = `
                    <i class="ph ph-spinner-gap text-xl animate-spin-custom"></i>
                    <span>Processing...</span>
                `;
            } else {
                mergeBtn.disabled = selectedFiles.length < 2;
                mergeBtn.innerHTML = `
                    <i class="ph ph-magic-wand text-lg"></i>
                    <span>Merge Files</span>
                `;
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            
            toast.className = 'flex items-center gap-3 px-4 py-3.5 rounded-xl shadow-2xl font-medium transform transition-all duration-300 translate-y-[-20px] opacity-0 max-w-sm border ring-1 ring-white/10';
            
            let icon = '';
            if (type === 'success') {
                toast.classList.add('bg-emerald-600', 'text-white', 'border-emerald-500');
                icon = '<i class="ph ph-check-circle text-2xl"></i>';
            } else if (type === 'error') {
                toast.classList.add('bg-red-600', 'text-white', 'border-red-500');
                icon = '<i class="ph ph-warning-circle text-2xl"></i>';
            } else if (type === 'warning') {
                toast.classList.add('bg-amber-500', 'text-slate-900', 'border-amber-400');
                icon = '<i class="ph ph-warning text-2xl"></i>';
            } else {
                toast.classList.add('bg-slate-800', 'text-white', 'border-slate-700');
                icon = '<i class="ph ph-info text-2xl text-indigo-400"></i>';
            }

            toast.innerHTML = `${icon}<span class="text-sm leading-tight">${message}</span>`;
            toastContainer.appendChild(toast);

            requestAnimationFrame(() => toast.classList.remove('translate-y-[-20px]', 'opacity-0'));

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-[20px]');
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
