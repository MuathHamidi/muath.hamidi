from ase.build import make_supercell

# 1. Build primitive, then expand to 2x2x2 Supercell (32 atoms)
a = 4.689
primitive = Atoms('CeIn3', scaled_positions=[(0,0,0), (0.5,0.5,0), (0.5,0,0.5), (0.0,0.5,0.5)], cell=[a,a,a])

supercell.append('H')

builder = load_code('pw-7.5@rorqual').get_builder()
builder.structure = StructureData(ase=supercell)
builder.pseudos = load_group('SSSP/1.3/PBE/efficiency').get_pseudos(structure=builder.structure)

            cube3d: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>'
        };

        // UI State Variables
        let activeId = 'intro';
        let activeTab = 'overview';
        let currentMagState = 'AFM';
        
        // Bulletproof Three.js memory management state
        let threeState = {

        // Strictly dispose of everything from the previous render cycle
        function cleanupThreeJS() {
            if (threeState.animationId) {
                cancelAnimationFrame(threeState.animationId);
                threeState.animationId = null;
            }
            if (threeState.observer) {
                threeState.observer.disconnect();
                threeState.observer = null;
            }
            if (threeState.renderer) {
                threeState.renderer.dispose();
                threeState.renderer.forceContextLoss();
                const domElement = threeState.renderer.domElement;
                if (domElement && domElement.parentNode) {
                    domElement.parentNode.removeChild(domElement);
                }
                threeState.renderer = null;
            }
            if (threeState.scene) {
                threeState.scene.clear();
                threeState.scene = null;
            }
            threeState.camera = null;
            threeState.controls = null;
        }

            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function initThreeJS() {
            cleanupThreeJS(); // Guarantee memory is wiped before building a new simulation

            const container = document.getElementById('three-container');
            if (!container) return;
            
            const data = steps.find(s => s.id === activeId); // Fetch data for current step

            // Ultimate Failsafe: Sweep the div for any ghost canvases that survived React/innerHTML
            const existingCanvases = container.getElementsByTagName('canvas');
            while(existingCanvases.length > 0) {
                existingCanvases[0].parentNode.removeChild(existingCanvases[0]);

            container.innerHTML = ''; 

            const scene = new THREE.Scene();
            threeState.scene = scene;
            scene.background = new THREE.Color('#0f172a'); 
            
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            threeState.camera = camera;
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            threeState.renderer = renderer;
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // Force absolute positioning of the canvas to eliminate flexbox layout overlaps
            renderer.domElement.style.position = 'absolute';

            renderer.domElement.style.left = '0';
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            renderer.domElement.style.zIndex = '1';
            
            container.appendChild(renderer.domElement);

            const a = 4.689;
            const centerOffset = a; 
            
            const muonPos = new THREE.Vector3(0.5 * a, 0.5 * a, 0.5 * a);

            camera.position.set(muonPos.x + 8, muonPos.y + 6, muonPos.z + 10);
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            threeState.controls = controls;
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;
            controls.target.copy(muonPos);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            function createLabelMaterial(text, colorStr) {
                const canvas = document.createElement('canvas');
                canvas.width = 128;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.font = 'bold 50px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                ctx.shadowColor = 'rgba(0,0,0,1)';
                ctx.shadowBlur = 4;
                ctx.lineWidth = 5;
                ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                ctx.strokeText(text, 64, 64);
                
                ctx.fillStyle = colorStr;
                ctx.fillText(text, 64, 64);
                
                const texture = new THREE.CanvasTexture(canvas);
                return new THREE.SpriteMaterial({ map: texture, transparent: true, depthWrite: false });
            }

            const ceLabelMat = createLabelMaterial('Ce', '#7dd3fc'); 
            const inLabelMat = createLabelMaterial('In', '#d8b4fe'); 

            const ceMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, shininess: 100, transparent: true, opacity: 0.25 }); 
            const inMat = new THREE.MeshPhongMaterial({ color: 0xc084fc, shininess: 80, transparent: true, opacity: 0.25 });  
            
            const muMat = new THREE.MeshPhongMaterial({ color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 1.0 }); 
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: 0xff0033, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending, depthWrite: false
            });

            const ceGeo = new THREE.SphereGeometry(0.7, 32, 32);  
            const inGeo = new THREE.SphereGeometry(0.45, 32, 32); 
            const muGeo = new THREE.SphereGeometry(0.35, 32, 32);
            const glowGeo = new THREE.SphereGeometry(0.6, 32, 32);

            for(let x=0; x<=2; x++) {
                for(let y=0; y<=2; y++) {
                    for(let z=0; z<=2; z++) {
                        const mesh = new THREE.Mesh(ceGeo, ceMat);
                        mesh.position.set(x*a - centerOffset, y*a - centerOffset, z*a - centerOffset);
                        
                        const sprite = new THREE.Sprite(ceLabelMat);
                        sprite.scale.set(1.4, 1.4, 1.4);
                        mesh.add(sprite);

                        // Only add spin arrows if the current step requires them
                        if (data && data.showSpins) {
                            let isUp = true;
                            if (currentMagState === 'AFM') {
                                const parity = (x + y + z) % 2;
                                isUp = (parity === 0);
                            }
                            
                            const spinColor = isUp ? 0xff0033 : 0x3b82f6; 
                            const spinDir = isUp ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(0, -1, 0);
                            const origin = new THREE.Vector3(0, 0, 0); 
                            
                            const arrowHelper = new THREE.ArrowHelper(spinDir, origin, 1.8, spinColor, 0.5, 0.3);
                            mesh.add(arrowHelper);
                        }
                        
                        scene.add(mesh);
                    }
                }
            }

            for(let x=0; x<2; x++) {
                for(let y=0; y<2; y++) {
                    for(let z=0; z<=2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set((x+0.5)*a - centerOffset, (y+0.5)*a - centerOffset, z*a - centerOffset);
                        const sprite = new THREE.Sprite(inLabelMat);
                        sprite.scale.set(1.1, 1.1, 1.1);
                        mesh.add(sprite);
                        scene.add(mesh);
                    }
                }
            }
            for(let x=0; x<2; x++) {
                for(let y=0; y<=2; y++) {
                    for(let z=0; z<2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set((x+0.5)*a - centerOffset, y*a - centerOffset, (z+0.5)*a - centerOffset);
                        const sprite = new THREE.Sprite(inLabelMat);
                        sprite.scale.set(1.1, 1.1, 1.1);
                        mesh.add(sprite);
                        scene.add(mesh);
                    }
                }
            }
            for(let x=0; x<=2; x++) {
                for(let y=0; y<2; y++) {
                    for(let z=0; z<2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set(x*a - centerOffset, (y+0.5)*a - centerOffset, (z+0.5)*a - centerOffset);
                        const sprite = new THREE.Sprite(inLabelMat);
                        sprite.scale.set(1.1, 1.1, 1.1);
                        mesh.add(sprite);
                        scene.add(mesh);
                    }
                }
            }

            const muonGroup = new THREE.Group();
            muonGroup.position.copy(muonPos); 
            
            const muonMesh = new THREE.Mesh(muGeo, muMat);
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            
            muonGroup.add(muonMesh);
            muonGroup.add(glowMesh);
            
            const muLight = new THREE.PointLight(0xff0033, 2, 10);
            muonGroup.add(muLight);
            scene.add(muonGroup);

            const bondMat = new THREE.MeshPhongMaterial({ color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 0.6, transparent: true, opacity: 0.7 });
            const neighbors = [
                new THREE.Vector3(0.5*a, 0.5*a, 0),
                new THREE.Vector3(0.5*a, 0.5*a, a),
                new THREE.Vector3(0.5*a, 0, 0.5*a),
                new THREE.Vector3(0.5*a, a, 0.5*a),
                new THREE.Vector3(0, 0.5*a, 0.5*a),
                new THREE.Vector3(a, 0.5*a, 0.5*a)
            ];
            
            neighbors.forEach(nPos => {
                const distance = muonPos.distanceTo(nPos);
                const cylinderGeo = new THREE.CylinderGeometry(0.04, 0.04, distance, 8);
                const mesh = new THREE.Mesh(cylinderGeo, bondMat);
                mesh.position.copy(muonPos).lerp(nPos, 0.5);
                mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), nPos.clone().sub(muonPos).normalize());
                scene.add(mesh);
            });

            const boxGeo = new THREE.BoxGeometry(2*a, 2*a, 2*a);
            const edges = new THREE.EdgesGeometry(boxGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x334155, opacity: 0.5, transparent: true }));
            scene.add(line);

            const startTime = Date.now();
            function animate() {
                threeState.animationId = requestAnimationFrame(animate);
                
                if(threeState.controls) threeState.controls.update();
                
                const elapsed = Date.now() - startTime;
                const scale = 1.0 + 0.2 * Math.sin(elapsed * 0.005);
                glowMesh.scale.set(scale, scale, scale);
                glowMesh.material.opacity = 0.4 + 0.2 * Math.sin(elapsed * 0.005);
                muLight.intensity = 1.5 + 0.5 * Math.sin(elapsed * 0.005);

                if(threeState.renderer && threeState.scene && threeState.camera) {
                    threeState.renderer.render(threeState.scene, threeState.camera);
                }
            }
            animate();

            threeState.observer = new ResizeObserver(() => {
                if (container && container.clientWidth && threeState.camera && threeState.renderer) {
                    threeState.camera.aspect = container.clientWidth / container.clientHeight;
                    threeState.camera.updateProjectionMatrix();
                    threeState.renderer.setSize(container.clientWidth, container.clientHeight);
                }
            });
            threeState.observer.observe(container);
        }

                    ${hasScripts ? `<button onclick="setActiveTab('code')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'code' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.code}</div> Python Script${data.scripts.length > 1 ? 's' : ''}</button>` : ''}

                            <button onclick='copy(steps.find(s=>s.id==="${activeId}").aiida_commands, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400" title="Copy to clipboard">${icons.copy}</button>

                 const afmClass = currentMagState === 'AFM' ? 'bg-sky-500/20 text-sky-400 border border-sky-500/30' : 'bg-slate-800 text-slate-400 hover:bg-slate-700 border border-transparent';
                 
                 const stateDescription = data.showSpins 
                     ? (currentMagState === 'FM' 
                         ? 'Notice the <strong>Red (Spin-Up)</strong> magnetic arrows attached to all Cerium atoms, visualizing the uniform Ferromagnetic state.'
                         : 'Notice the <strong>Red (Spin-Up)</strong> and <strong>Blue (Spin-Down)</strong> magnetic arrows attached to the Cerium atoms, visualizing the strictly alternating parity of the true G-type Antiferromagnetic ground state.')
                     : 'The geometry has been perfectly relaxed. At this stage, no magnetic polarization has been applied to the electrons yet, so no spin vectors are shown.';

                        <p class="text-slate-300 leading-relaxed text-sm mb-4">Interactive 3D visualization of the 2x2x2 $CeIn_3$ supercell. The lattice atoms are semi-transparent to reveal the Muon trapped inside the central Octahedral Void at exactly (0.5a, 0.5a, 0.5a). ${stateDescription}</p>

                            <div class="flex items-center gap-2 border-l border-slate-700/50 pl-4"><div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div> <span class="text-white font-bold tracking-wide">Muon (μ⁺)</span></div>

                        ${controlsOverlay}
                    </div>

                    <!-- Dedicated Three.js Canvas Container: Completely Empty so innerHTML clear works safely -->
                    <div id="three-container" class="w-full h-[500px] rounded-xl overflow-hidden border border-slate-700/50 shadow-[0_0_30px_rgba(0,0,0,0.5)] bg-black relative"></div>
                    `;
            } else if (activeTab === 'code' && hasScripts) {
                mainBody = '<div class="space-y-6">' + data.scripts.map((script, index) => `
                    <div class="bg-[#0b1120] rounded-xl overflow-hidden border border-emerald-900/50 shadow-2xl mt-4 relative">
                        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-emerald-900/50">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-mono text-emerald-400">Script ${data.scripts.length > 1 ? index + 1 : ''}:</span>
                                <span class="text-xs font-mono text-white bg-slate-800 px-2 py-0.5 rounded border border-slate-700 shadow-sm">${script.name}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <button onclick='downloadScript("${script.name}", steps.find(s=>s.id==="${activeId}").scripts[${index}].code)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-emerald-500/80 hover:text-emerald-400" title="Download Script as .py file">${icons.download}</button>
                                <div class="w-px h-4 bg-slate-700 mx-1"></div>
                                <button onclick='copy(steps.find(s=>s.id==="${activeId}").scripts[${index}].code, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400 hover:text-white" title="Copy code">${icons.copy}</button>
                            </div>
                        </div>
                        <pre class="overflow-x-auto"><code class="language-python">${script.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>
                    </div>
                `).join('') + '</div>';
            } else if (activeTab === 'cli') {
                mainBody = `
                    <div class="bg-black rounded-xl overflow-hidden border border-amber-900/50 shadow-2xl mt-4">
                        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-amber-900/50">
                            <span class="text-xs font-mono text-slate-500">jovyan@rorqual:~/muon_workspace/CeIn3/scripts$</span>
                            <button onclick='copy(steps.find(s=>s.id==="${activeId}").commands, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400" title="Copy to clipboard">${icons.copy}</button>
                        </div>
                        <pre><code class="language-bash">${data.commands.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>
                    </div>`;
            }

            content.innerHTML = `
                <div class="glass-panel rounded-2xl p-6 md:p-8 shadow-2xl animate-fade-in relative overflow-hidden min-h-[500px]">
                    <div class="relative z-10">
                        <div class="flex items-center gap-4 mb-6">
                            <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">${data.title}</h2>
                        </div>
                        ${tabs}
                        <div>${mainBody}</div>
                    </div>
                </div>`;
                
            // Delay initialization with debounce to prevent race conditions during rapid clicking
            if (threeState.initTimer) clearTimeout(threeState.initTimer);
            if (activeTab === '3d' && data.has3D) {
                threeState.initTimer = setTimeout(initThreeJS, 100); 
            } else {
                cleanupThreeJS();
            }

            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise().catch(function (err) {
                    console.log('MathJax typeset failed: ' + err.message);
                });
            }
            
            if (window.Prism) {
                Prism.highlightAllUnder(content);
            }
        }

        render();
    </script>
</body>
</html>
