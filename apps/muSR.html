builder.pseudos = load_group('SSSP/1.3/PBE/efficiency').get_pseudos(structure=structure)

from ase.build import make_supercell

            cube3d: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>'
        };

        let activeId = 'intro';
        let activeTab = 'overview';
        let animationId; // Track Three.js animation frame

        function updateProgressBar() {
            const index = steps.findIndex(s => s.id === activeId);
            const percentage = ((index + 1) / steps.length) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        function renderSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.innerHTML = '<div class="timeline-line"></div>' + steps.map((s, idx) => {
                const isActive = activeId === s.id;
                return `
                <div class="timeline-item relative pb-4">
                    <button onclick="setActiveStep('${s.id}')" class="z-10 w-full text-left flex items-center p-3 rounded-2xl transition-all duration-300 ${isActive ? 'bg-slate-800 border border-sky-500/30 shadow-lg translate-x-2' : 'hover:bg-slate-800/40'}">
                        <div class="w-10 h-10 rounded-full border-2 flex items-center justify-center flex-shrink-0 font-bold ${isActive ? 'bg-sky-500/20 border-sky-400 text-sky-400 shadow-md' : 'bg-slate-900 border-slate-700 text-slate-500'}">
                            ${idx}
                        </div>
                        <div class="ml-4 flex-grow">
                            <h4 class="font-semibold text-sm leading-tight ${isActive ? 'text-white' : 'text-slate-400'}">${s.title}</h4>
                        </div>
                    </button>
                </div>`;
            }).join('');
        }

        function setActiveStep(id) { activeId = id; activeTab = 'overview'; render(); }
        function setActiveTab(tab) { activeTab = tab; render(); }

        function copy(text, btn) {
            navigator.clipboard.writeText(text);
            const old = btn.innerHTML;
            btn.innerHTML = `<div class="flex items-center gap-1 text-emerald-400">${icons.check}<span class="text-xs font-bold">Copied</span></div>`;
            setTimeout(() => btn.innerHTML = old, 2000);
        }

        function downloadScript(filename, content) {
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function initThreeJS() {
            const container = document.getElementById('three-container');
            if (!container) return;

            if (animationId) cancelAnimationFrame(animationId);
            container.innerHTML = ''; // clear any existing canvas

            const scene = new THREE.Scene();
            scene.background = new THREE.Color('#0f172a'); // slate-900

            // Camera setup
            const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            const a = 4.689;
            const centerOffset = a; 
            
            // The precise theoretical muon coordinate
            // Fractional (0.25, 0.25, 0.25) in 2a supercell maps to a/2 from the corner
            // With centering, it sits exactly at (0.5a, 0.5a, 0.5a)
            const muonPos = new THREE.Vector3(0.5 * a, 0.5 * a, 0.5 * a);

            // Orbit strictly around the Muon!
            camera.position.set(muonPos.x + 8, muonPos.y + 6, muonPos.z + 10);
            const controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 2.0;
            controls.target.copy(muonPos);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // Materials - Making lattice semi-transparent to reveal the trapped Muon
            const ceMat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, shininess: 100, transparent: true, opacity: 0.3 }); // Sky blue (Cerium)
            const inMat = new THREE.MeshPhongMaterial({ color: 0xc084fc, shininess: 80, transparent: true, opacity: 0.3 });  // Purple (Indium)
            
            // Glowing Muon Materials
            const muMat = new THREE.MeshPhongMaterial({ color: 0xff0033, emissive: 0xff0033, emissiveIntensity: 1.0 }); 
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: 0xff0033, 
                transparent: true, 
                opacity: 0.5, 
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            // Geometries
            const ceGeo = new THREE.SphereGeometry(0.6, 32, 32);
            const inGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const muGeo = new THREE.SphereGeometry(0.35, 32, 32);
            const glowGeo = new THREE.SphereGeometry(0.6, 32, 32);

            // Create Ce atoms (Corners of the primitive cells)
            for(let x=0; x<=2; x++) {
                for(let y=0; y<=2; y++) {
                    for(let z=0; z<=2; z++) {
                        const mesh = new THREE.Mesh(ceGeo, ceMat);
                        mesh.position.set(x*a - centerOffset, y*a - centerOffset, z*a - centerOffset);
                        scene.add(mesh);
                    }
                }
            }

            // Create In atoms (Face centers of the primitive cells)
            // xy faces
            for(let x=0; x<2; x++) {
                for(let y=0; y<2; y++) {
                    for(let z=0; z<=2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set((x+0.5)*a - centerOffset, (y+0.5)*a - centerOffset, z*a - centerOffset);
                        scene.add(mesh);
                    }
                }
            }
            // xz faces
            for(let x=0; x<2; x++) {
                for(let y=0; y<=2; y++) {
                    for(let z=0; z<2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set((x+0.5)*a - centerOffset, y*a - centerOffset, (z+0.5)*a - centerOffset);
                        scene.add(mesh);
                    }
                }
            }
            // yz faces
            for(let x=0; x<=2; x++) {
                for(let y=0; y<2; y++) {
                    for(let z=0; z<2; z++) {
                        const mesh = new THREE.Mesh(inGeo, inMat);
                        mesh.position.set(x*a - centerOffset, (y+0.5)*a - centerOffset, (z+0.5)*a - centerOffset);
                        scene.add(mesh);
                    }
                }
            }

            // Muon Injection
            const muonGroup = new THREE.Group();
            muonGroup.position.copy(muonPos); 
            
            const muonMesh = new THREE.Mesh(muGeo, muMat);
            const glowMesh = new THREE.Mesh(glowGeo, glowMat);
            muonGroup.add(muonMesh);
            muonGroup.add(glowMesh);
            
            const muLight = new THREE.PointLight(0xff0033, 2, 10);
            muonGroup.add(muLight);
            scene.add(muonGroup);

            // Explicitly draw the "Octahedral Trap" (interaction lines to nearest Indium atoms)
            const bondMat = new THREE.LineBasicMaterial({ color: 0xff0033, transparent: true, opacity: 0.8, linewidth: 2 });
            const neighbors = [
                new THREE.Vector3(0.5*a, 0.5*a, 0),
                new THREE.Vector3(0.5*a, 0.5*a, a),
                new THREE.Vector3(0.5*a, 0, 0.5*a),
                new THREE.Vector3(0.5*a, a, 0.5*a),
                new THREE.Vector3(0, 0.5*a, 0.5*a),
                new THREE.Vector3(a, 0.5*a, 0.5*a)
            ];
            
            neighbors.forEach(nPos => {
                const pts = [muonPos, nPos];
                const geo = new THREE.BufferGeometry().setFromPoints(pts);
                scene.add(new THREE.Line(geo, bondMat));
            });

            // Add subtle bounding box edges
            const boxGeo = new THREE.BoxGeometry(2*a, 2*a, 2*a);
            const edges = new THREE.EdgesGeometry(boxGeo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x334155, opacity: 0.5, transparent: true }));
            scene.add(line);

            // Pulsing Animation loop
            const startTime = Date.now();
            function animate() {
                animationId = requestAnimationFrame(animate);
                controls.update();
                
                // Make the muon glow "breathe" to represent zero-point motion energy
                const elapsed = Date.now() - startTime;
                const scale = 1.0 + 0.2 * Math.sin(elapsed * 0.005);
                glowMesh.scale.set(scale, scale, scale);
                glowMesh.material.opacity = 0.4 + 0.2 * Math.sin(elapsed * 0.005);

                renderer.render(scene, camera);
            }
            animate();

            // Handle resize
            const resizeObserver = new ResizeObserver(() => {
                if (container && container.clientWidth) {
                    camera.aspect = container.clientWidth / container.clientHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(container.clientWidth, container.clientHeight);
                }
            });
            resizeObserver.observe(container);
        }

        function render() {
            renderSidebar();
            updateProgressBar();
            
            const data = steps.find(s => s.id === activeId);
            const content = document.getElementById('content-area');

            // Generate Tabs
            const hasScripts = data.scripts && data.scripts.length > 0;
            const tabs = `
                <div class="flex flex-wrap gap-2 border-b border-slate-800 mb-6 pb-2">
                    <button onclick="setActiveTab('overview')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'overview' ? 'bg-sky-500/10 text-sky-400 border border-sky-500/30' : 'text-slate-400 hover:bg-slate-800'}">
                        <div class="flex items-center justify-center">${icons.book}</div> Theory & Physics
                    </button>
                    ${data.aiida_commands ? `<button onclick="setActiveTab('aiida')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'aiida' ? 'bg-indigo-500/10 text-indigo-400 border border-indigo-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.tool}</div> AiiDA Toolkit</button>` : ''}
                    ${data.hpc_resources ? `<button onclick="setActiveTab('hpc')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'hpc' ? 'bg-purple-500/10 text-purple-400 border border-purple-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.cpu}</div> HPC Specs</button>` : ''}
                    ${data.has3D ? `<button onclick="setActiveTab('3d')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === '3d' ? 'bg-pink-500/10 text-pink-400 border border-pink-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.cube3d}</div> 3D Simulation</button>` : ''}
                    ${hasScripts ? `<button onclick="setActiveTab('code')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'code' ? 'bg-emerald-500/10 text-emerald-400 border border-emerald-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.code}</div> Python Script${data.scripts.length > 1 ? 's' : ''}</button>` : ''}
                    ${data.commands ? `<button onclick="setActiveTab('cli')" class="flex items-center gap-2 px-4 py-2 text-sm font-medium rounded-lg transition-all ${activeTab === 'cli' ? 'bg-amber-500/10 text-amber-400 border border-amber-500/30' : 'text-slate-400 hover:bg-slate-800'}"><div class="flex items-center justify-center">${icons.terminal}</div> CLI Execution</button>` : ''}
                </div>`;

            let mainBody = '';
            
            // Tab contents
            if (activeTab === 'overview') {
                mainBody = `
                    <div class="mb-8">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Objective</h3>
                        <p class="text-lg text-slate-200 leading-relaxed font-light">${data.goal}</p>
                    </div>
                    <div class="mb-8">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Context</h3>
                        <p class="text-slate-300 leading-relaxed mb-6">${data.overview}</p>
                        ${data.math || ''}
                    </div>`;
            } else if (activeTab === 'aiida') {
                 mainBody = `
                    <div class="bg-black rounded-xl overflow-hidden border border-indigo-900/50 shadow-2xl mt-4">
                        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-indigo-900/50">
                            <span class="text-xs font-mono text-indigo-400">Essential AiiDA Operations</span>
                            <button onclick='copy(steps.find(s=>s.id==="${activeId}").aiida_commands, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400" title="Copy to clipboard">${icons.copy}</button>
                        </div>
                        <pre class="overflow-x-auto"><code class="language-bash">${data.aiida_commands.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>
                    </div>`;
            } else if (activeTab === 'hpc' && data.hpc_resources) {
                 mainBody = data.hpc_resources;
            } else if (activeTab === '3d' && data.has3D) {
                 mainBody = `
                    <div class="mb-6">
                        <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Supercell Muon Site Simulation</h3>
                        <p class="text-slate-300 leading-relaxed text-sm mb-4">Interactive 3D visualization of the 2x2x2 $CeIn_3$ supercell. The lattice atoms have been made semi-transparent to reveal the Muon perfectly trapped inside the central Octahedral Void at exactly (0.5a, 0.5a, 0.5a). The glowing red bond lines represent the Muon's immediate interaction with its 6 nearest Indium neighbors.</p>
                    </div>
                    <div id="three-container" class="w-full h-[500px] rounded-xl overflow-hidden border border-slate-700/50 shadow-[0_0_30px_rgba(0,0,0,0.5)] relative">
                        <div class="absolute top-4 left-4 bg-slate-900/80 backdrop-blur border border-slate-700 p-3 rounded-lg z-10 text-xs">
                            <div class="flex items-center gap-2 mb-2"><div class="w-3 h-3 rounded-full bg-sky-400"></div> <span class="text-slate-300">Cerium (Ce)</span></div>
                            <div class="flex items-center gap-2 mb-2"><div class="w-3 h-3 rounded-full bg-purple-400"></div> <span class="text-slate-300">Indium (In)</span></div>
                            <div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]"></div> <span class="text-white font-bold">Muon (μ+)</span></div>
                        </div>
                    </div>`;
            } else if (activeTab === 'code' && hasScripts) {
                mainBody = '<div class="space-y-6">' + data.scripts.map((script, index) => `
                    <div class="bg-[#0b1120] rounded-xl overflow-hidden border border-emerald-900/50 shadow-2xl mt-4 relative">
                        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-emerald-900/50">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-mono text-emerald-400">Script ${data.scripts.length > 1 ? index + 1 : ''}:</span>
                                <span class="text-xs font-mono text-white bg-slate-800 px-2 py-0.5 rounded border border-slate-700 shadow-sm">${script.name}</span>
                            </div>
                            <div class="flex items-center gap-1">
                                <button onclick='downloadScript("${script.name}", steps.find(s=>s.id==="${activeId}").scripts[${index}].code)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-emerald-500/80 hover:text-emerald-400" title="Download Script as .py file">${icons.download}</button>
                                <div class="w-px h-4 bg-slate-700 mx-1"></div>
                                <button onclick='copy(steps.find(s=>s.id==="${activeId}").scripts[${index}].code, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400 hover:text-white" title="Copy code">${icons.copy}</button>
                            </div>
                        </div>
                        <pre class="overflow-x-auto"><code class="language-python">${script.code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>
                    </div>
                `).join('') + '</div>';
            } else if (activeTab === 'cli') {
                mainBody = `
                    <div class="bg-black rounded-xl overflow-hidden border border-amber-900/50 shadow-2xl mt-4">
                        <div class="flex items-center justify-between px-4 py-3 bg-slate-900 border-b border-amber-900/50">
                            <span class="text-xs font-mono text-slate-500">jovyan@rorqual:~/muon_workspace/CeIn3/scripts$</span>
                            <button onclick='copy(steps.find(s=>s.id==="${activeId}").commands, this)' class="p-1.5 flex items-center justify-center hover:bg-slate-700 rounded transition-colors text-slate-400" title="Copy to clipboard">${icons.copy}</button>
                        </div>
                        <pre><code class="language-bash">${data.commands.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</code></pre>
                    </div>`;
            }

            content.innerHTML = `
                <div class="glass-panel rounded-2xl p-6 md:p-8 shadow-2xl animate-fade-in relative overflow-hidden min-h-[500px]">
                    <div class="relative z-10">
                        <div class="flex items-center gap-4 mb-6">
                            <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight">${data.title}</h2>
                        </div>
                        ${tabs}
                        <div>${mainBody}</div>
                    </div>
                </div>`;
                
            // Handle Three.js initialization
            if (activeTab === '3d' && data.has3D) {
                // slight delay to ensure DOM is fully painted
                setTimeout(initThreeJS, 50);
            } else if (animationId) {
                // Cleanup animation if leaving 3D tab
                cancelAnimationFrame(animationId);
            }

            // Trigger MathJax re-render safely for LaTeX equations
            if (window.MathJax && typeof window.MathJax.typesetPromise === 'function') {
                MathJax.typesetPromise().catch(function (err) {
                    console.log('MathJax typeset failed: ' + err.message);
                });
            }
            
            // Trigger PrismJS syntax highlighting
            if (window.Prism) {
                Prism.highlightAllUnder(content);
            }
        }

        render();
    </script>
</body>
</html>
